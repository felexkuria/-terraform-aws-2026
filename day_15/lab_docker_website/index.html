<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS50 Lab: Dockerized Perfection</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="glass-container">
        <header>
            <div class="badge">Day 15: Docker Lab</div>
            <h1>THIS IS <span>DOCKER</span>.</h1>
            <p class="subtitle">You have successfully containerized your first web application.</p>
        </header>

        <section class="status-card">
            <div class="status-indicator">
                <div class="pulse"></div>
                <span>Container Status: <strong>LIVE</strong></span>
            </div>
            <div class="stats">
                <div class="stat">
                    <span class="label">Architecture</span>
                    <span class="value">Isolated</span>
                </div>
                <div class="stat">
                    <span class="label">Efficiency</span>
                    <span class="value">100%</span>
                </div>
                <div class="stat">
                    <span class="label">Port</span>
                    <span class="value">8080:80</span>
                </div>
            </div>
        </section>

        <footer>
            <p>Congratulations! You've just orchestrated a symphony of infrastructure.</p>
            <div class="social-links">
                <a href="#" class="btn-primary">Learn More</a>
                <a href="#" class="btn-secondary">View Documentation</a>
            </div>
        </footer>
    </main>
</body>
</html>
